name: Lint

on:
  push:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install R lint/style dependencies
        # Pinned to the versions tested locally - an unpinned install let CI pick up
        # a newer lintr that added a new default linter (pipe_consistency_linter),
        # which failed CI despite passing locally.
        run: |
          Rscript -e 'install.packages("remotes")'
          Rscript -e 'remotes::install_version("styler", version = "1.10.3")'
          Rscript -e 'remotes::install_version("lintr", version = "3.2.0")'
        shell: bash

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1
